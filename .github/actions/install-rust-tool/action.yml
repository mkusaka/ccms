name: Install Rust tool
description: Install a Cargo tool via taiki-e/install-action

inputs:
  tool:
    description: Cargo binary to install
    required: true

runs:
  using: composite
  steps:
    - name: Install tool
      uses: taiki-e/install-action@97a5807a604e12de3a13b52d868ebecaeeea757c # v2.75.4
      with:
        tool: ${{ inputs.tool }}
