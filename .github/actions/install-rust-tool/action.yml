name: Install Rust tool
description: Install a Cargo tool via taiki-e/install-action

inputs:
  tool:
    description: Cargo binary to install
    required: true

runs:
  using: composite
  steps:
    - name: Install tool
      uses: taiki-e/install-action@213ccc1a076163c093f914550b94feb90fab916d # v2.79.2
      with:
        tool: ${{ inputs.tool }}
