name: Install Rust tool
description: Install a Cargo tool via taiki-e/install-action

inputs:
  tool:
    description: Cargo binary to install
    required: true

runs:
  using: composite
  steps:
    - name: Install tool
      uses: taiki-e/install-action@0c7a94999971db56e9df89df226240aab222e776 # v2.75.14
      with:
        tool: ${{ inputs.tool }}
