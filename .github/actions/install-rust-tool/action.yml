name: Install Rust tool
description: Install a Cargo tool via taiki-e/install-action

inputs:
  tool:
    description: Cargo binary to install
    required: true

runs:
  using: composite
  steps:
    - name: Install tool
      uses: taiki-e/install-action@13608cbb45b01feb47ef444ab1a42dc41ad56f1a # v2.79.11
      with:
        tool: ${{ inputs.tool }}
