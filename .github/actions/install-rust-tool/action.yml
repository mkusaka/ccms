name: Install Rust tool
description: Install a Cargo tool via taiki-e/install-action

inputs:
  tool:
    description: Cargo binary to install
    required: true

runs:
  using: composite
  steps:
    - name: Install tool
      uses: taiki-e/install-action@3d832235cb306500b868c2632a137d48634568cd # v2.81.0
      with:
        tool: ${{ inputs.tool }}
