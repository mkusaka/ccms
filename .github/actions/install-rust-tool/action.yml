name: Install Rust tool
description: Install a Cargo tool via taiki-e/install-action

inputs:
  tool:
    description: Cargo binary to install
    required: true

runs:
  using: composite
  steps:
    - name: Install tool
      uses: taiki-e/install-action@5939f3337e40968c39aa70f5ecb1417a92fb25a0 # v2.75.15
      with:
        tool: ${{ inputs.tool }}
