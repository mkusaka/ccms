name: Install Rust tool
description: Install a Cargo tool via taiki-e/install-action

inputs:
  tool:
    description: Cargo binary to install
    required: true

runs:
  using: composite
  steps:
    - name: Install tool
      uses: taiki-e/install-action@59012be0884e296ca2da49b530610e72c49039ad # v2.81.6
      with:
        tool: ${{ inputs.tool }}
