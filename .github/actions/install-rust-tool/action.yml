name: Install Rust tool
description: Install a Cargo tool via taiki-e/install-action

inputs:
  tool:
    description: Cargo binary to install
    required: true

runs:
  using: composite
  steps:
    - name: Install tool
      uses: taiki-e/install-action@a1df9120380005ebdc788c62449b841b205541dd # v2.71.0
      with:
        tool: ${{ inputs.tool }}
