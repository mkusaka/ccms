name: Install Rust tool
description: Install a Cargo tool via taiki-e/install-action

inputs:
  tool:
    description: Cargo binary to install
    required: true

runs:
  using: composite
  steps:
    - name: Install tool
      uses: taiki-e/install-action@3771e22aa892e03fd35585fae288baad1755695c # v2.78.2
      with:
        tool: ${{ inputs.tool }}
