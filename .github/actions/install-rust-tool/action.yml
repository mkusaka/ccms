name: Install Rust tool
description: Install a Cargo tool via taiki-e/install-action

inputs:
  tool:
    description: Cargo binary to install
    required: true

runs:
  using: composite
  steps:
    - name: Install tool
      uses: taiki-e/install-action@3235f8901fd37ffed0052b276cec25a362fb82e9 # v2.77.7
      with:
        tool: ${{ inputs.tool }}
